name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
 
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn sqlalchemy passlib[bcrypt] python-jose[cryptography] pytest httpx

      - name: Run pytest
        run: pytest tests/ -v --tb=short
        # If you have no tests yet, replace with:
        # run: echo "No tests defined yet — skipping"


  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test          # only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Write the SSH private key from GitHub Secrets to a temp file
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # Copy the updated backend file to the server
      - name: Copy files to EC2
        run: |
          scp -i ~/.ssh/deploy_key \
              joes_pizza_backend.py \
              requirements.txt \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.EC2_APP_DIR }}

      # SSH in and restart the app
      - name: Restart application on EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

            set -e
            cd ${{ secrets.EC2_APP_DIR }}

            echo "→ Activating virtual environment..."
            source venv/bin/activate

            echo "→ Installing / updating dependencies..."
            pip install -r requirements.txt --quiet

            echo "→ Restarting uvicorn via systemd..."
            sudo systemctl restart joes_pizza

            echo "→ Checking service health..."
            sleep 3
            sudo systemctl is-active --quiet joes_pizza && echo "Service is running" || echo "Service failed to start"

          EOF

      # Optional: hit the /health endpoint to confirm the API is live
      - name: Smoke test — health check
        run: |
          sleep 5
          curl --fail http://${{ secrets.EC2_HOST }}/health \
            && echo " API is live" \
            || (echo " Health check failed" && exit 1)

      - name: Notify on success
        if: success()
        run: echo "Joe's Pizza API deployed successfully to EC2!"

      - name: Notify on failure
        if: failure()
        run: echo "🚨 Deployment failed — check the logs above."
